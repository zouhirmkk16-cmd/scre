<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapTools - Spy & Monitor Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- OGAds Locker Integration Script -->
    <script type="text/javascript" id="ogjs" src="https://appsave.online/cl/js/grj95p"></script>
    
    <style>
        :root {
            --snap-yellow: #FFFC00;
            --snap-black: #000000;
            --bg-chat: #0b0b0c;
            --bg-workspace: #000000;
            --bg-bubble-user: #1d1d1f;
            --border-color: #262629;
            --text-main: #ececec;
            --text-muted: #9e9e9e;
            --font-main: 'Poppins', sans-serif;
        }

        /* ستيل الطور المضيء - Light Mode */
        [data-theme="light"] {
            --bg-chat: #f9f9f9;
            --bg-workspace: #ffffff;
            --bg-bubble-user: #e2e2e5;
            --border-color: #e5e5e5;
            --text-main: #0d0d0d;
            --text-muted: #676767;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
        }

        body {
            background-color: var(--bg-workspace);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* حاوية الشات بستايل ChatGPT */
        .chat-container {
            width: 100%;
            max-width: 480px;
            background: var(--bg-chat);
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        /* الهيدر العلوي */
        .chat-header {
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-chat);
            position: sticky;
            top: 0;
            z-index: 50;
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        .ai-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 15px;
        }

        .ai-avatar {
            width: 30px;
            height: 30px;
            background: var(--snap-yellow);
            color: var(--snap-black);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            box-shadow: 0 2px 8px rgba(255, 252, 0, 0.3);
        }

        /* زر تغيير الألوان */
        .theme-switcher-btn {
            background: transparent;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            font-size: 16px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
        }
        .theme-switcher-btn:hover {
            background: var(--bg-bubble-user);
        }

        /* منطقة رسائل الشات الحية */
        .chat-history {
            flex-grow: 1;
            overflow-y: auto;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        .chat-row {
            display: flex;
            gap: 14px;
            max-width: 100%;
        }

        .chat-row.user-row {
            flex-direction: row-reverse;
        }

        .msg-bubble {
            padding: 4px 0;
            font-size: 14px;
            line-height: 1.6;
            max-width: 85%;
        }

        .user-row .msg-bubble {
            background: var(--bg-bubble-user);
            padding: 10px 16px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        /* أنيميشن التنقيط */
        .typing-dots {
            display: inline-flex;
            gap: 4px;
            align-items: center;
            padding: 8px 0;
        }

        .typing-dots span {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounceDot 1.4s infinite ease-in-out both;
        }
        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounceDot {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }

        /* صندوق الخيارات المفهومة */
        .options-box {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
            width: 100%;
        }

        .chat-opt-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px 16px;
            border-radius: 12px;
            text-align: left;
            font-size: 13.5px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }
        .chat-opt-btn:hover {
            background: var(--bg-bubble-user);
            border-color: var(--text-main);
        }
        .chat-opt-btn i {
            color: var(--text-muted);
            font-size: 12px;
        }

        /* إطار الصورة داخل الشات */
        .media-preview-container {
            border: 1px solid var(--border-color);
            background: var(--bg-bubble-user);
            border-radius: 12px;
            margin-top: 12px;
            overflow: hidden;
            max-width: 280px;
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        .media-header-label {
            padding: 8px 12px;
            background: rgba(0,0,0,0.1);
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            border-bottom: 1px solid var(--border-color);
        }

        .media-frame {
            position: relative;
            height: 150px;
            background: #000;
        }

        .media-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.3;
            filter: blur(4px);
        }

        .media-blur-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 600;
            color: #ffffff;
        }

        /* شريط الـ Progress */
        .progress-block {
            margin-top: 12px;
            width: 100%;
        }

        .progress-labels {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .progress-bar-bg {
            width: 100%;
            background: var(--bg-bubble-user);
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--text-main);
            width: 0%;
        }

        /* مساج عرض الـ Locker النهائي */
        .offer-verification-card {
            border: 1px dashed var(--text-muted);
            background: var(--bg-bubble-user);
            border-radius: 16px;
            padding: 20px;
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 14px;
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        .offer-verification-card h4 {
            font-size: 15px;
            font-weight: 700;
        }

        .offer-verification-card p {
            font-size: 13px;
            color: var(--text-main);
            line-height: 1.5;
        }

        .gpt-action-btn {
            width: 100%;
            background: var(--snap-yellow);
            color: var(--snap-black);
            border: none;
            padding: 13px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(255, 252, 0, 0.2);
            transition: transform 0.2s;
        }
        .gpt-action-btn:active { transform: scale(0.98); }

        /* صندوق الإدخال التحتاني */
        .chat-input-area {
            padding: 16px;
            background: var(--bg-chat);
            transition: background 0.3s ease;
        }

        .input-box-container {
            background: var(--bg-workspace);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            display: flex;
            align-items: center;
            padding: 6px 6px 6px 16px;
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        .input-box-container:focus-within {
            border-color: var(--text-main);
        }

        .gpt-input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 14px;
            flex-grow: 1;
            padding: 8px 0;
        }

        .send-btn {
            width: 32px;
            height: 32px;
            background: var(--text-main);
            color: var(--bg-chat);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: background 0.3s, color 0.3s;
        }
        .send-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .footer-terms {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 10px;
        }

        .hidden-row { display: none !important; }
    </style>
</head>
<body>

    <div class="chat-container">
        <!-- الهيدر مع زر الألوان و اسم البراند الجديد -->
        <div class="chat-header">
            <div class="ai-brand">
                <div class="ai-avatar"><i class="fa-brands fa-snapchat"></i></div>
                <span>SnapTools Spy Console</span>
            </div>
            <button class="theme-switcher-btn" id="themeSwitcher" onclick="toggleInterfaceColorTheme()">
                <i class="fa-solid fa-sun"></i>
            </button>
        </div>

        <!-- ساحة عرض المحادثة -->
        <div class="chat-history" id="chatWindow">
            
            <!-- رسالة الترحيب بستايل التجسس المباشر على أي حساب -->
            <div class="chat-row ai-row" id="welcomeMsg">
                <div class="ai-avatar"><i class="fa-brands fa-snapchat"></i></div>
                <div class="msg-bubble">
                    Welcome to SnapTools. Enter the username of the target Snapchat account you want to monitor and view below.
                </div>
            </div>

            <!-- أنيميشن التنقيط المؤقت -->
            <div class="chat-row ai-row hidden-row" id="typingBubble">
                <div class="ai-avatar"><i class="fa-brands fa-snapchat"></i></div>
                <div class="msg-bubble">
                    <div class="typing-dots"><span></span><span></span><span></span></div>
                </div>
            </div>

        </div>

        <!-- شريط الكتابة السفلي -->
        <div class="chat-input-area">
            <div class="input-box-container">
                <input type="text" class="gpt-input" id="userInputField" placeholder="Enter target Snapchat username..." autocomplete="off">
                <button class="send-btn" id="sendBtn" onclick="submitUserIdentifier()">
                    <i class="fa-solid fa-arrow-up"></i>
                </button>
            </div>
            <div class="footer-terms">Official Safe Framework Panel 2026.</div>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chatWindow');
        const userInputField = document.getElementById('userInputField');
        const sendBtn = document.getElementById('sendBtn');
        const typingBubble = document.getElementById('typingBubble');
        const themeSwitcher = document.getElementById('themeSwitcher');

        const assetMap = {
            'radar': 'Snaping.jpg',
            'friends': 'friends.jpg',
            'vault': 'eyes.jpg',
            'chat': 'chat.jpg',
            'location': 'location.jpg',
            'feed': 'typing.jpg'
        };

        userInputField.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') submitUserIdentifier();
        });

        function toggleInterfaceColorTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'light');
                themeSwitcher.innerHTML = '<i class="fa-solid fa-moon"></i>';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeSwitcher.innerHTML = '<i class="fa-solid fa-sun"></i>';
            }
        }

        function showTyping() {
            chatWindow.appendChild(typingBubble);
            typingBubble.classList.remove('hidden-row');
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function hideTyping() {
            typingBubble.classList.add('hidden-row');
        }

        function appendUserMessage(text) {
            const row = document.createElement('div');
            row.className = 'chat-row user-row';
            row.innerHTML = `<div class="msg-bubble">${text}</div>`;
            chatWindow.appendChild(row);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function appendAiMessage(htmlContent) {
            const row = document.createElement('div');
            row.className = 'chat-row ai-row';
            row.innerHTML = `
                <div class="ai-avatar"><i class="fa-brands fa-snapchat"></i></div>
                <div class="msg-bubble">${htmlContent}</div>
            `;
            chatWindow.appendChild(row);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function submitUserIdentifier() {
            const val = userInputField.value.trim();
            if (val === '') return;

            userInputField.value = '';
            userInputField.disabled = true;
            sendBtn.disabled = true;

            appendUserMessage(val);

            setTimeout(() => {
                showTyping();
                
                setTimeout(() => {
                    hideTyping();
                    const optionsHtml = `
                        Target profile linked: <strong>@${val}</strong>. Select what data layer you want to view from this user:
                        <div class="options-box">
                            <button class="chat-opt-btn" onclick="selectModuleNode('Snapchat Snaping', 'radar')"><span>Snapchat Snaping</span><i class="fa-solid fa-chevron-right"></i></button>
                            <button class="chat-opt-btn" onclick="selectModuleNode('View Friends List', 'friends')"><span>View Friends List</span><i class="fa-solid fa-chevron-right"></i></button>
                            <button class="chat-opt-btn" onclick="selectModuleNode('Private Stories', 'vault')"><span>Private Stories</span><i class="fa-solid fa-chevron-right"></i></button>
                            <button class="chat-opt-btn" onclick="selectModuleNode('Chat History', 'chat')"><span>Chat History</span><i class="fa-solid fa-chevron-right"></i></button>
                            <button class="chat-opt-btn" onclick="selectModuleNode('Live Location Map', 'location')"><span>Live Location Map</span><i class="fa-solid fa-chevron-right"></i></button>
                            <button class="chat-opt-btn" onclick="selectModuleNode('Recent Activity', 'feed')"><span>Recent Activity</span><i class="fa-solid fa-chevron-right"></i></button>
                        </div>
                    `;
                    appendAiMessage(optionsHtml);
                }, 1200);
            }, 3000);
        }

        function selectModuleNode(nodeName, assetKey) {
            const btns = document.querySelectorAll('.chat-opt-btn');
            btns.forEach(b => b.removeAttribute('onclick'));

            appendUserMessage(`Access ${nodeName}`);

            setTimeout(() => {
                showTyping();

                setTimeout(() => {
                    hideTyping();
                    
                    const barId = 'bar_' + Date.now();
                    const txtId = 'txt_' + Date.now();
                    const targetImg = assetMap[assetKey] || 'emojis.JPG';

                    const loadingHtml = `
                        Fetching hidden database for <strong>${nodeName}</strong>. Tracking user records...
                        
                        <div class="progress-block">
                            <div class="progress-labels">
                                <span>Downloading files...</span>
                                <span id="${txtId}" style="font-weight:700;">0%</span>
                            </div>
                            <div class="progress-bar-bg">
                                <div class="progress-bar-fill" id="${barId}"></div>
                            </div>
                        </div>

                        <div class="media-preview-container">
                            <div class="media-header-label"><i class="fa-solid fa-image"></i> Preview Window</div>
                            <div class="media-frame">
                                <img src="${targetImg}" alt="Preview View">
                                <div class="media-blur-overlay">
                                    <i class="fa-solid fa-lock" style="font-size:16px; margin-bottom: 4px;"></i>
                                    <span>LOCKED_PREVIEW.JPG</span>
                                </div>
                            </div>
                        </div>
                    `;
                    appendAiMessage(loadingHtml);
                    animateProgressBarNode(barId, txtId);

                }, 1000);
            }, 3000);
        }

        function animateProgressBarNode(barId, txtId) {
            let percentage = 0;
            const fill = document.getElementById(barId);
            const text = document.getElementById(txtId);

            const loop = setInterval(() => {
                percentage += 2;
                if(fill) fill.style.width = percentage + '%';
                if(text) text.innerText = percentage + '%';

                if(percentage >= 100) {
                    clearInterval(loop);
                    setTimeout(() => {
                        showTyping();
                        setTimeout(() => {
                            hideTyping();
                            const finalOfferHtml = `
                                <div class="offer-verification-card">
                                    <i class="fa-solid fa-circle-exclamation" style="font-size: 24px;"></i>
                                    <h4>Complete One Offer Below</h4>
                                    <p>The monitoring process is 100% complete. To unlock the dashboard and start viewing the spy panel, please click the button below and complete <strong>one quick offer</strong> from the list.</p>
                                    <button class="gpt-action-btn" onclick="openOgadsGate()">
                                        <i class="fa-solid fa-unlock-keyhole"></i> Complete Verification
                                    </button>
                                </div>
                            `;
                            appendAiMessage(finalOfferHtml);
                        }, 1200);
                    }, 500);
                }
            }, 30);
        }

        function openOgadsGate() {
            if (typeof og_load === 'function') {
                og_load(); 
            } else {
                window.location.href = "https://appsave.online/cl/i/grj95p";
            }
        }
    </script>
</body>
</html>
