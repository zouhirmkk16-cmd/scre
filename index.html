<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SnapTools Pro | Enterprise Verification Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --snap-yellow: #FFFC00;
            --snap-black: #000000;
            --bg-chat: #0b0b0f;
            --bg-workspace: #030303;
            --bg-bubble-user: #1f1f24;
            --border-color: #27272e;
            --text-main: #f4f4f7;
            --text-muted: #8e8e93;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --chat-btn-bg: #121217;
            --chat-btn-border: #2c2c35;
            --menu-bg: rgba(11, 11, 15, 0.98);
            --alert-bg: rgba(15, 15, 20, 0.95);
            --alert-border: rgba(255, 252, 0, 0.3);
            --accent-green: #00ff66;
        }

        [data-theme="light"] {
            --bg-chat: #f4f4f7;
            --bg-workspace: #e5e5ea;
            --bg-bubble-user: #e5e5ea;
            --border-color: #d1d1d6;
            --text-main: #1c1c1e;
            --text-muted: #8e8e93;
            --chat-btn-bg: #ffffff;
            --chat-btn-border: #e5e5ea;
            --menu-bg: rgba(244, 244, 247, 0.98);
            --alert-bg: rgba(255, 255, 255, 0.95);
            --alert-border: rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            background-color: var(--bg-workspace);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        .chat-container {
            width: 100%;
            max-width: 480px;
            background: var(--bg-chat);
            background-image: 
                radial-gradient(var(--border-color) 1px, transparent 0),
                linear-gradient(to right, rgba(255,252,0,0.015) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,252,0,0.015) 1px, transparent 1px);
            background-size: 24px 24px, 40px 40px, 40px 40px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            position: relative;
            overflow: hidden;
            transition: background-color 0.3s;
        }

        .chat-header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-chat);
            z-index: 99;
            position: relative;
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-bars-btn {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 20px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            transition: background-color 0.2s;
        }
        .menu-bars-btn:hover { background: var(--bg-bubble-user); }

        .ai-brand {
            font-weight: 800;
            font-size: 20px;
            letter-spacing: -0.5px;
        }
        .ai-brand .part-snap { color: var(--snap-yellow); text-shadow: 0 0 10px rgba(255,252,0,0.3); }

        .theme-btn {
            background: var(--chat-btn-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-size: 14px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .snap-dropdown-menu {
            position: absolute;
            top: 68px;
            left: 16px;
            width: 240px;
            background: var(--menu-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.4);
            display: none;
            flex-direction: column;
            overflow: hidden;
            z-index: 1000;
            animation: slideDown 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .menu-item {
            padding: 14px 18px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-color);
            transition: background 0.2s;
        }
        .menu-item:hover { background: var(--bg-bubble-user); }
        .menu-item i { color: var(--snap-yellow); width: 16px; }

        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            z-index: 5;
        }

        .chat-row { display: flex; gap: 12px; max-width: 100%; }
        .chat-row.user-row { flex-direction: row-reverse; }

        .bot-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            background: var(--snap-yellow);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(255,252,0,0.2);
        }
        .bot-avatar img { width: 70%; height: 70%; object-fit: contain; }

        .msg-bubble { font-size: 14.5px; line-height: 1.6; max-width: 85%; color: var(--text-main); }
        .user-row .msg-bubble {
            background: var(--bg-bubble-user);
            padding: 12px 18px;
            border-radius: 20px 4px 20px 20px;
            font-weight: 600;
            border: 1px solid var(--border-color);
        }

        .typing-dots { display: inline-flex; gap: 4px; align-items: center; padding: 10px 4px; }
        .typing-dots span {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounceDot 1.4s infinite ease-in-out both;
        }
        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounceDot { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        .options-box { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; width: 100%; }

        .chat-opt-btn {
            background: var(--chat-btn-bg);
            border: 1px solid var(--chat-btn-border);
            color: var(--text-main);
            padding: 16px;
            border-radius: 14px;
            text-align: left;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s ease;
        }
        .chat-opt-btn:hover { border-color: var(--snap-yellow); background: rgba(255,252,0,0.02); }

        .btn-left-content { display: flex; align-items: center; gap: 12px; }
        .chat-opt-btn i.btn-icon { color: var(--snap-yellow); font-size: 15px; width: 20px; text-align: center; }

        /* Modern Terminal Shell */
        .console-log-box {
            background: #020205;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px;
            margin-top: 14px;
            font-family: var(--font-mono);
            font-size: 12px;
            color: #d1d1d6;
            max-height: 150px;
            overflow-y: auto;
            line-height: 1.5;
            display: none;
        }
        .console-line { margin-bottom: 4px; display: flex; gap: 8px; }
        .console-success { color: var(--accent-green); }
        .console-warn { color: var(--snap-yellow); }

        .progress-block { margin-top: 16px; }
        .progress-labels { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-main); margin-bottom: 8px; font-weight: 600; }
        .progress-bar-bg { width: 100%; background: var(--border-color); height: 6px; border-radius: 10px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: var(--snap-yellow); width: 0%; transition: width 0.1s linear; box-shadow: 0 0 10px rgba(255,252,0,0.5); }

        /* Integrated Verification Card */
        .verification-card {
            border: 1px solid var(--border-color);
            background: linear-gradient(145deg, #121218, #09090c);
            border-radius: 24px;
            padding: 24px 20px;
            margin-top: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 16px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .verification-card h4 { font-size: 18px; font-weight: 800; color: var(--text-main); }
        .verification-card p { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
        
        .security-badge {
            background: rgba(255,252,0,0.1);
            border: 1px solid var(--snap-yellow);
            color: var(--snap-yellow);
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .action-btn {
            width: 100%;
            background: var(--snap-yellow);
            color: var(--snap-black);
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(255,252,0,0.3);
            transition: transform 0.2s;
        }
        .action-btn:active { transform: scale(0.98); }

        .chat-input-area { padding: 12px 16px 24px 16px; background: var(--bg-chat); border-top: 1px solid var(--border-color); }
        .input-box-container {
            background: var(--chat-btn-bg);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            display: flex;
            align-items: center;
            padding: 4px 4px 4px 20px;
        }
        .gpt-input { background: transparent; border: none; outline: none; color: var(--text-main); font-size: 14.5px; flex-grow: 1; padding: 12px 0; }
        .gpt-input::placeholder { color: var(--text-muted); }
        
        .send-btn {
            width: 44px;
            height: 44px;
            background: var(--snap-yellow);
            color: var(--snap-black);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: transform 0.2s;
        }
        .send-btn:active { transform: scale(0.95); }

        .footer-banner { text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 12px; }

        .hidden-row { display: none !important; }

        /* Notification Alert */
        .custom-alert {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--alert-bg);
            border: 1px solid var(--alert-border);
            color: var(--text-main);
            padding: 12px 20px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 13px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            z-index: 9999;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
            opacity: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .custom-alert.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .custom-alert i { color: #ff4444; }
    </style>
</head>
<body>

    <div class="custom-alert" id="errorAlert">
        <i class="fa-solid fa-triangle-exclamation"></i> <span>Please input a valid target username!</span>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <div class="header-left">
                <button class="menu-bars-btn" onclick="toggleSnapMenu(event)">
                    <i class="fa-solid fa-bars-staggered"></i>
                </button>
                <div class="brand-wrapper">
                    <span class="ai-brand">
                        <span class="part-snap"><i class="fa-ghost fa-solid"></i> Snap</span><span>Tools</span>
                    </span>
                </div>
            </div>
            <div class="header-actions">
                <button class="theme-btn" id="themeToggleBtn" onclick="toggleThemeNode()">
                    <i class="fa-solid fa-moon"></i>
                </button>
            </div>
        </div>

        <div class="snap-dropdown-menu" id="snapMenu">
            <a href="https://snapchat.com/privacy" target="_blank" class="menu-item"><i class="fa-solid fa-user-shield"></i> Privacy Center</a>
            <a href="https://snapchat.com/community" target="_blank" class="menu-item"><i class="fa-solid fa-gavel"></i> Community Guidelines</a>
            <a href="https://support.snapchat.com" target="_blank" class="menu-item"><i class="fa-solid fa-circle-question"></i> Help Desk</a>
        </div>

        <div class="chat-history" id="chatWindow">
            <div class="chat-row ai-row" id="welcomeMsg">
                <div class="bot-avatar"><img src="https://assets.scandit.com/wp-content/uploads/2021/04/Snapchat_logo.svg" alt="Snapchat"></div>
                <div class="msg-bubble" id="welcomeText"></div>
            </div>

            <div class="chat-row ai-row hidden-row" id="typingBubble">
                <div class="bot-avatar"><img src="https://assets.scandit.com/wp-content/uploads/2021/04/Snapchat_logo.svg" alt="Snapchat"></div>
                <div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>
            </div>
        </div>

        <div class="chat-input-area">
            <div class="input-box-container">
                <input type="text" class="gpt-input" id="userInputField" placeholder="Target @username..." autocomplete="off">
                <button class="send-btn" id="sendBtn" onclick="submitUserIdentifier()">
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>
            <div class="footer-banner">Encrypted Bypass Session Secured. SSL 256-Bit Layer.</div>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chatWindow');
        const userInputField = document.getElementById('userInputField');
        const sendBtn = document.getElementById('sendBtn');
        const typingBubble = document.getElementById('typingBubble');
        const themeToggleBtn = document.getElementById('themeToggleBtn');
        const snapMenu = document.getElementById('snapMenu');
        const errorAlert = document.getElementById('errorAlert');

        let isProcessingStarted = false;
        let currentTargetUser = "";
        let alertTimeout = null;

        document.body.setAttribute('data-theme', 'dark');
        
        function toggleThemeNode() {
            const currentTheme = document.body.getAttribute('data-theme');
            if(currentTheme === 'dark') {
                document.body.setAttribute('data-theme', 'light');
                themeToggleBtn.innerHTML = `<i class="fa-solid fa-sun"></i>`;
            } else {
                document.body.setAttribute('data-theme', 'dark');
                themeToggleBtn.innerHTML = `<i class="fa-solid fa-moon"></i>`;
            }
        }

        function toggleSnapMenu(event) {
            event.stopPropagation();
            snapMenu.style.display = snapMenu.style.display === 'flex' ? 'none' : 'flex';
        }

        document.addEventListener('click', () => { snapMenu.style.display = 'none'; });

        function typeWriterEffect(elementId, text, speed = 10, callback = null) {
            let i = 0;
            const element = document.getElementById(elementId);
            element.innerHTML = '';
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                } else if (callback) {
                    callback();
                }
            }
            type();
        }

        window.onload = () => {
            typeWriterEffect("welcomeText", "Initialize terminal. Enter the target Snapchat @username below to secure an active access node.", 10);
        };

        userInputField.addEventListener('keydown', (e) => { 
            if (e.key === 'Enter') submitUserIdentifier(); 
        });

        function showTyping() {
            chatWindow.appendChild(typingBubble);
            typingBubble.classList.remove('hidden-row');
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function hideTyping() { typingBubble.classList.add('hidden-row'); }

        function appendUserMessage(text) {
            const row = document.createElement('div');
            row.className = 'chat-row user-row';
            row.innerHTML = `<div class="msg-bubble">${text}</div>`;
            chatWindow.appendChild(row);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function showAlertNotification() {
            if(alertTimeout) clearTimeout(alertTimeout);
            errorAlert.classList.add('show');
            alertTimeout = setTimeout(() => { errorAlert.classList.remove('show'); }, 3000);
        }

        function submitUserIdentifier() {
            const val = userInputField.value.trim();
            if (val === '') { showAlertNotification(); return; }
            if (isProcessingStarted) return; 

            isProcessingStarted = true;
            currentTargetUser = val;
            userInputField.value = '';
            userInputField.disabled = true;
            sendBtn.disabled = true;

            appendUserMessage('@' + val);

            setTimeout(() => {
                showTyping();
                setTimeout(() => {
                    hideTyping();
                    const nextId = 'ai_' + Date.now();
                    const row = document.createElement('div');
                    row.className = 'chat-row ai-row';
                    row.innerHTML = `
                        <div class="bot-avatar"><img src="https://assets.scandit.com/wp-content/uploads/2021/04/Snapchat_logo.svg" alt="Snapchat"></div>
                        <div class="msg-bubble" id="${nextId}"></div>
                    `;
                    chatWindow.appendChild(row);
                    
                    const responseText = `Database payload ready. Select the endpoint channel to initialize for target user @${val}:`;
                    
                    typeWriterEffect(nextId, responseText, 8, () => {
                        const optionsHtml = `
                            <div class="options-box">
                                <button class="chat-opt-btn" onclick="selectModuleNode('Snapchat Snaping', '${val}')">
                                    <div class="btn-left-content">
                                        <i class="fa-solid fa-bolt btn-icon"></i>
                                        <span>Intercept Snaps</span>
                                    </div>
                                    <i class="fa-solid fa-chevron-right"></i>
                                </button>
                                <button class="chat-opt-btn" onclick="selectModuleNode('Private Stories', '${val}')">
                                    <div class="btn-left-content">
                                        <i class="fa-solid fa-eye-slash btn-icon"></i>
                                        <span>Read Private Stories</span>
                                    </div>
                                    <i class="fa-solid fa-chevron-right"></i>
                                </button>
                                <button class="chat-opt-btn" onclick="selectModuleNode('Chat History', '${val}')">
                                    <div class="btn-left-content">
                                        <i class="fa-solid fa-comment-dots btn-icon"></i>
                                        <span>Extract Chat Logs</span>
                                    </div>
                                    <i class="fa-solid fa-chevron-right"></i>
                                </button>
                            </div>
                        `;
                        document.getElementById(nextId).innerHTML += optionsHtml;
                        chatWindow.scrollTop = chatWindow.scrollHeight;
                    });
                }, 1000);
            }, 800);
        }

        function selectModuleNode(nodeName, username) {
            const btns = document.querySelectorAll('.chat-opt-btn');
            btns.forEach(b => b.removeAttribute('onclick'));
            appendUserMessage(nodeName);

            setTimeout(() => {
                showTyping();
                setTimeout(() => {
                    hideTyping();
                    const nextId = 'ai_load_' + Date.now();
                    const consoleId = 'console_' + Date.now();
                    const barId = 'bar_' + Date.now();
                    const txtId = 'txt_' + Date.now();

                    const row = document.createElement('div');
                    row.className = 'chat-row ai-row';
                    row.innerHTML = `
                        <div class="bot-avatar"><img src="https://assets.scandit.com/wp-content/uploads/2021/04/Snapchat_logo.svg" alt="Snapchat"></div>
                        <div class="msg-bubble" id="${nextId}"></div>
                    `;
                    chatWindow.appendChild(row);

                    const loadingIntro = `Bypassing SSL Pinning... Injecting remote exploits for ${nodeName}:`;
                    
                    typeWriterEffect(nextId, loadingIntro, 8, () => {
                        const loadingHtml = `
                            <div class="console-log-box" id="${consoleId}" style="display:block;"></div>
                            <div class="progress-block">
                                <div class="progress-labels">
                                    <span>Decrypting database...</span>
                                    <span id="${txtId}" style="font-weight:700; color:var(--snap-yellow);">0%</span>
                                </div>
                                <div class="progress-bar-bg">
                                    <div class="progress-bar-fill" id="${barId}"></div>
                                </div>
                            </div>
                        `;
                        document.getElementById(nextId).innerHTML += loadingHtml;
                        animateTerminalShell(consoleId, barId, txtId);
                    });
                }, 800);
            }, 600);
        }

        function animateTerminalShell(consoleId, barId, txtId) {
            const consoleBox = document.getElementById(consoleId);
            const logs = [
                { t: "Connecting to Snap Gateway...", s: "normal" },
                { t: "Establishing anonymous SSH handshake...", s: "normal" },
                { t: "Target nodes verified.", s: "success" },
                { t: "Injecting memory payloads...", s: "warn" },
                { t: "Memory address: 0x7FFF90A2 allocated.", s: "normal" },
                { t: "Bypassing biometric authorization...", s: "warn" },
                { t: "Data package payload matched successfully.", s: "success" },
                { t: "Packing extracted files for decryption...", s: "normal" }
            ];

            let i = 0;
            const logInterval = setInterval(() => {
                if (i < logs.length) {
                    const line = document.createElement('div');
                    line.className = 'console-line';
                    if (logs[i].s === 'success') line.classList.add('console-success');
                    if (logs[i].s === 'warn') line.classList.add('console-warn');
                    line.innerHTML = `<span>></span> <span>${logs[i].t}</span>`;
                    consoleBox.appendChild(line);
                    consoleBox.scrollTop = consoleBox.scrollHeight;
                    i++;
                } else {
                    clearInterval(logInterval);
                    animateProgressBar(barId, txtId);
                }
            }, 400);
        }

        function animateProgressBar(barId, txtId) {
            let percentage = 0;
            const fill = document.getElementById(barId);
            const text = document.getElementById(txtId);

            const loop = setInterval(() => {
                percentage += 4;
                if(fill) fill.style.width = percentage + '%';
                if(text) text.innerText = percentage + '%';

                if(percentage >= 100) {
                    clearInterval(loop);
                    setTimeout(() => {
                        showTyping();
                        setTimeout(() => {
                            hideTyping();
                            const finalCardId = 'final_' + Date.now();
                            const row = document.createElement('div');
                            row.className = 'chat-row ai-row';
                            row.innerHTML = `
                                <div class="bot-avatar"><img src="https://assets.scandit.com/wp-content/uploads/2021/04/Snapchat_logo.svg" alt="Snapchat"></div>
                                <div class="msg-bubble" id="${finalCardId}"></div>
                            `;
                            chatWindow.appendChild(row);

                            const finalOfferHtml = `
                                <div class="verification-card">
