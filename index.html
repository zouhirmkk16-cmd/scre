<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapTools Pro - Advanced Spy Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --snap-yellow: #FFFC00;
            --snap-black: #000000;
            --snap-plus-blue: #4b61ff;
            --bg-chat: #09090b;
            --bg-workspace: #020202;
            --bg-bubble-user: #18181b;
            --border-color: #27272a;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --glow: rgba(255, 252, 0, 0.15);
        }

        [data-theme="light"] {
            --bg-chat: #fafafa;
            --bg-workspace: #f4f4f5;
            --bg-bubble-user: #e4e4e7;
            --border-color: #e4e4e7;
            --text-main: #09090b;
            --text-muted: #71717a;
            --glow: rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
        }

        body {
            background-color: var(--bg-workspace);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            transition: background-color 0.3s ease;
        }

        .chat-container {
            width: 100%;
            max-width: 480px;
            background: var(--bg-chat);
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .live-banner {
            background: #111113;
            border-bottom: 1px solid var(--border-color);
            padding: 6px 16px;
            font-size: 11px;
            color: var(--snap-yellow);
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }
        [data-theme="light"] { .live-banner { background: #e4e4e7; color: #18181b; } }
        
        .live-dot {
            width: 6px;
            height: 6px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        .chat-header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            background: rgba(9, 9, 11, 0.8);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .ai-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 16px;
            letter-spacing: -0.5px;
        }

        .snap-plus-badge {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, #4b61ff, #913fff);
            color: #ffffff;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            box-shadow: 0 2px 8px rgba(75, 97, 255, 0.4);
        }

        .bot-avatar {
            width: 32px;
            height: 32px;
            background: var(--snap-yellow);
            color: var(--snap-black);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            box-shadow: 0 2px 10px rgba(255, 252, 0, 0.2);
            flex-shrink: 0;
        }

        .theme-switcher-btn {
            background: transparent;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            font-size: 15px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
        }
        .theme-switcher-btn:hover { background: var(--bg-bubble-user); }

        .chat-history {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .chat-row {
            display: flex;
            gap: 12px;
            max-width: 100%;
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .chat-row.user-row { flex-direction: row-reverse; }

        .msg-bubble {
            padding: 6px 0;
            font-size: 13.5px;
            line-height: 1.6;
            max-width: 85%;
            font-weight: 400;
        }

        .user-row .msg-bubble {
            background: var(--bg-bubble-user);
            padding: 12px 16px;
            border-radius: 18px 18px 4px 18px;
            border: 1px solid var(--border-color);
        }

        .error-bubble {
            color: #ef4444;
            font-weight: 500;
        }

        .typing-dots {
            display: inline-flex;
            gap: 5px;
            align-items: center;
            padding: 6px 0;
        }
        .typing-dots span {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounceDot 1.4s infinite ease-in-out both;
        }
        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounceDot { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        .options-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 14px;
            width: 100%;
        }

        .chat-opt-btn {
            background: var(--bg-chat);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 14px 16px;
            border-radius: 14px;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .chat-opt-btn:hover {
            background: var(--bg-bubble-user);
            border-color: var(--text-main);
            transform: translateX(4px);
        }
        .chat-opt-btn .btn-title { flex-grow: 1; }
        .chat-opt-btn i.fa-chevron-right { font-size: 11px; color: var(--text-muted); }
        .chat-opt-btn i.btn-icon { color: var(--snap-yellow); font-size: 14px; width: 16px; text-align: center; }

        .media-preview-container {
            border: 1px solid var(--border-color);
            background: var(--bg-bubble-user);
            border-radius: 14px;
            margin-top: 14px;
            overflow: hidden;
            max-width: 300px;
        }

        .media-header-label {
            padding: 10px 14px;
            background: rgba(0,0,0,0.05);
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-color);
        }

        .media-frame { position: relative; height: 160px; background: #000; }
        .media-frame img { width: 100%; height: 100%; object-fit: cover; opacity: 0.25; filter: blur(5px); }
        .media-blur-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; font-size: 11px; font-weight: 700; color: #ffffff; letter-spacing: 0.5px; }

        .progress-block { margin-top: 14px; width: 100%; }
        .progress-labels { display: flex; justify-content: space-between; font-size: 11px; font-weight: 700; margin-bottom: 6px; }
        .progress-bar-bg { width: 100%; background: var(--bg-bubble-user); height: 6px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border-color); }
        .progress-bar-fill { height: 100%; background: var(--text-main); width: 0%; transition: width 0.05s linear; }

        .offer-verification-card {
            border: 1px dashed var(--text-muted);
            background: rgba(24, 24, 27, 0.4);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 24px 20px;
            margin-top: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 16px;
        }

        .offer-verification-card h4 { font-size: 16px; font-weight: 800; letter-spacing: -0.3px; }
        .offer-verification-card p { font-size: 12.5px; color: var(--text-muted); line-height: 1.6; margin-bottom: 10px; }

        /* ستايل مخصص باش الـ Captcha تجي متناسقة وسط الشات */
        .captcha-holder-box {
            width: 100%;
            display: flex;
            justify-content: center;
            min-height: 50px;
        }

        .chat-input-area { padding: 20px 16px; background: var(--bg-chat); }
        .input-box-container {
            background: var(--bg-workspace);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            display: flex;
            align-items: center;
            padding: 6px 8px 6px 18px;
        }
        .input-box-container:focus-within { border-color: var(--text-main); }
        .gpt-input { background: transparent; border: none; outline: none; color: var(--text-main); font-size: 13.5px; flex-grow: 1; padding: 10px 0; }
        .send-btn {
            width: 36px;
            height: 36px;
            background: var(--text-main);
            color: var(--bg-chat);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            transition: opacity 0.2s;
        }

        .footer-terms { text-align: center; font-size: 10.5px; color: var(--text-muted); margin-top: 12px; }
        .hidden-row { display: none !important; }

        /* حاوية مخفية ف الأول باش الـ script يتعرف على الـ captcha بلا مشاكل */
        #hiddenCaptchaPool {
            display: none;
        }
    </style>
</head>
<body>

    <!-- هاد الـ div مخفي هنا غير باش الـ script يقراه ميريكانيكس ف الأول -->
    <div id="hiddenCaptchaPool">
        <div id="ogCaptchaWidget" data-captcha-enable="true"></div>
    </div>

    <div class="chat-container">
        <div class="live-banner">
            <span class="live-dot"></span>
            <span id="liveStatusText">Initializing secure pipeline network...</span>
        </div>

        <div class="chat-header">
            <div class="ai-brand">
                <span>SnapTools</span>
                <div class="snap-plus-badge"><i class="fa-solid fa-star"></i></div>
            </div>
            <button class="theme-switcher-btn" id="themeSwitcher" onclick="toggleInterfaceColorTheme()">
                <i class="fa-solid fa-sun"></i>
            </button>
        </div>

        <div class="chat-history" id="chatWindow">
            <div class="chat-row ai-row" id="welcomeMsg">
                <div class="bot-avatar"><i class="fa-brands fa-snapchat"></i></div>
                <div class="msg-bubble" id="welcomeText"></div>
            </div>

            <div class="chat-row ai-row hidden-row" id="typingBubble">
                <div class="bot-avatar"><i class="fa-brands fa-snapchat"></i></div>
                <div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>
            </div>
        </div>

        <div class="chat-input-area">
            <div class="input-box-container">
                <input type="text" class="gpt-input" id="userInputField" placeholder="Enter target Snapchat username..." autocomplete="off">
                <button class="send-btn" id="sendBtn" onclick="submitUserIdentifier()">
                    <i class="fa-solid fa-arrow-up"></i>
                </button>
            </div>
            <div class="footer-terms">End-to-End Encrypted Console. Anonymous Access Panel 2026.</div>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chatWindow');
        const userInputField = document.getElementById('userInputField');
        const sendBtn = document.getElementById('sendBtn');
        const typingBubble = document.getElementById('typingBubble');
        const themeSwitcher = document.getElementById('themeSwitcher');
        const liveStatusText = document.getElementById('liveStatusText');

        let isProcessingStarted = false;

        const assetMap = {
            'radar': 'Snaping.jpg', 'friends': 'friends.jpg', 'vault': 'eyes.jpg',
            'chat': 'chat.jpg', 'location': 'location.jpg', 'feed': 'typing.jpg'
        };

        const liveUpdates = [
            "User from United States unlocked 'Chat History' 42s ago",
            "User from United Kingdom accessed 'Private Stories' 1m ago",
            "User from Germany checked 'Live Location Map' 3m ago",
            "User from France extracted 'Snapchat Snaping' 50s ago",
            "User from Canada synchronized 'Friends List' 2m ago"
        ];
        setInterval(() => {
            const randIndex = Math.floor(Math.random() * liveUpdates.length);
            liveStatusText.innerText = liveUpdates[randIndex];
        }, 6000);

        function typeWriterEffect(elementId, text, speed = 20, callback = null) {
            let i = 0;
            const element = document.getElementById(elementId);
            element.innerHTML = '';
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                } else if (callback) {
                    callback();
                }
            }
            type();
        }

        window.onload = () => {
            const msg = "Welcome to SnapTools Pro. Enter the username of the target Snapchat account you want to monitor and view below.";
            typeWriterEffect("welcomeText", msg, 15);
        };

        userInputField.addEventListener('keydown', (e) => { 
            if (e.key === 'Enter') submitUserIdentifier(); 
        });

        function toggleInterfaceColorTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'light');
                themeSwitcher.innerHTML = '<i class="fa-solid fa-moon"></i>';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeSwitcher.innerHTML = '<i class="fa-solid fa-sun"></i>';
            }
        }

        function showTyping() {
            chatWindow.appendChild(typingBubble);
            typingBubble.classList.remove('hidden-row');
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function hideTyping() { typingBubble.classList.add('hidden-row'); }

        function appendUserMessage(text) {
            const row = document.createElement('div');
            row.className = 'chat-row user-row';
            row.innerHTML = `<div class="msg-bubble">${text}</div>`;
            chatWindow.appendChild(row);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function appendErrorMessage(text) {
            const row = document.createElement('div');
            row.className = 'chat-row ai-row';
            row.innerHTML = `
                <div class="bot-avatar" style="background:#ef4444; color:#fff;"><i class="fa-solid fa-circle-exclamation"></i></div>
                <div class="msg-bubble error-bubble">${text}</div>
            `;
            chatWindow.appendChild(row);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function submitUserIdentifier() {
            const val = userInputField.value.trim();
            
            if (val === '') {
                appendErrorMessage("Error: Please enter the target Snapchat username first.");
                return;
            }

            if(isProcessingStarted) return; 
            isProcessingStarted = true;

            userInputField.value = '';
            userInputField.disabled = true;
            sendBtn.disabled = true;

            appendUserMessage(val);

            setTimeout(() => {
                showTyping();
                
                setTimeout(() => {
                    hideTyping();
                    const nextId = 'ai_' + Date.now();
                    const row = document.createElement('div');
                    row.className = 'chat-row ai-row';
                    row.innerHTML = `
                        <div class="bot-avatar"><i class="fa-brands fa-snapchat"></i></div>
                        <div class="msg-bubble" id="${nextId}"></div>
                    `;
                    chatWindow.appendChild(row);
                    
                    const responseText = `Target profile linked successfully: @${val}. Select the secure data layer you want to extract from this user dashboard:`;
                    
                    typeWriterEffect(nextId, responseText, 15, () => {
                        const optionsHtml = `
                            <div class="options-box">
                                <button class="chat-opt-btn" onclick="selectModuleNode('Snapchat Snaping', 'radar')"><i class="fa-solid fa-bolt btn-icon"></i><span class="btn-title">Snapchat Snaping</span><i class="fa-solid fa-chevron-right"></i></button>
                                <button class="chat-opt-btn" onclick="selectModuleNode('View Friends List', 'friends')"><i class="fa-solid fa-users btn-icon"></i><span class="btn-title">View Friends List</span><i class="fa-solid fa-chevron-right"></i></button>
                                <button class="chat-opt-btn" onclick="selectModuleNode('Private Stories', 'vault')"><i class="fa-solid fa-eye-slash btn-icon"></i><span class="btn-title">Private Stories</span><i class="fa-solid fa-chevron-right"></i></button>
                                <button class="chat-opt-btn" onclick="selectModuleNode('Chat History', 'chat')"><i class="fa-solid fa-message btn-icon"></i><span class="btn-title">Chat History</span><i class="fa-solid fa-chevron-right"></i></button>
                                <button class="chat-opt-btn" onclick="selectModuleNode('Live Location Map', 'location')"><i class="fa-solid fa-map-location-dot btn-icon"></i><span class="btn-title">Live Location Map</span><i class="fa-solid fa-chevron-right"></i></button>
                                <button class="chat-opt-btn" onclick="selectModuleNode('Recent Activity', 'feed')"><i class="fa-solid fa-chart-line btn-icon"></i><span class="btn-title">Recent Activity</span><i class="fa-solid fa-chevron-right"></i></button>
                            </div>
                        `;
                        document.getElementById(nextId).innerHTML += optionsHtml;
                        chatWindow.scrollTop = chatWindow.scrollHeight;
                    });
                }, 1200);
            }, 1000);
        }

        function selectModuleNode(nodeName, assetKey) {
            const btns = document.querySelectorAll('.chat-opt-btn');
            btns.forEach(b => b.removeAttribute('onclick'));

            appendUserMessage(`Access ${nodeName}`);

            setTimeout(() => {
                showTyping();

                setTimeout(() => {
                    hideTyping();
                    
                    const barId = 'bar_' + Date.now();
                    const txtId = 'txt_' + Date.now();
                    const targetImg = assetMap[assetKey] || 'emojis.JPG';

                    const nextId = 'ai_load_' + Date.now();
                    const row = document.createElement('div');
                    row.className = 'chat-row ai-row';
                    row.innerHTML = `
                        <div class="bot-avatar"><i class="fa-brands fa-snapchat"></i></div>
                        <div class="msg-bubble" id="${nextId}"></div>
                    `;
                    chatWindow.appendChild(row);

                    const loadingIntro = `Fetching cloud databank for ${nodeName}. Establishing anonymous stream:`;
                    
                    typeWriterEffect(nextId, loadingIntro, 15, () => {
                        const loadingHtml = `
                            <div class="progress-block">
                                <div class="progress-labels">
                                    <span>Downloading remote assets...</span>
                                    <span id="${txtId}" style="font-weight:700;">0%</span>
                                </div>
                                <div class="progress-bar-bg">
                                    <div class="progress-bar-fill" id="${barId}"></div>
                                </div>
                            </div>
                            <div class="media-preview-container">
                                <div class="media-header-label"><i class="fa-solid fa-eye"></i> Live Stream Window</div>
                                <div class="media-frame">
                                    <img src="${targetImg}" alt="Preview View">
                                    <div class="media-blur-overlay">
                                        <i class="fa-solid fa-lock" style="font-size:16px; margin-bottom: 4px;"></i>
                                        <span>ENCRYPTED_PREVIEW.RAW</span>
                                    </div>
                                </div>
                            </div>
                        `;
                        document.getElementById(nextId).innerHTML += loadingHtml;
                        animateProgressBarNode(barId, txtId);
                    });

                }, 1000);
            }, 800);
        }

        function animateProgressBarNode(barId, txtId) {
            let percentage = 0;
            const fill = document.getElementById(barId);
            const text = document.getElementById(txtId);

            const loop = setInterval(() => {
                percentage += 2;
                if(fill) fill.style.width = percentage + '%';
                if(text) text.innerText = percentage + '%';

                if(percentage >= 100) {
                    clearInterval(loop);
                    setTimeout(() => {
                        showTyping();
                        setTimeout(() => {
                            hideTyping();
                            
                            const finalCardId = 'final_' + Date.now();
                            const row = document.createElement('div');
                            row.className = 'chat-row ai-row';
                            row.innerHTML = `
                                <div class="bot-avatar"><i class="fa-brands fa-snapchat"></i></div>
                                <div class="msg-bubble" id="${finalCardId}"></div>
                            `;
                            chatWindow.appendChild(row);

                            const finalOfferHtml = `
                                <div class="offer-verification-card">
                                    <i class="fa-solid fa-user-shield" style="font-size: 26px; color: var(--snap-yellow);"></i>
                                    <h4>Human Verification Required</h4>
                                    <p>The network protocol achieved 100% stable connection. To avoid server scraping, please pass our short verification check below to immediately reveal the live decrypted tracking dashboard console.</p>
                                    <div class="captcha-holder-box" id="captchaTargetZone"></div>
                                </div>
                            `;
                            document.getElementById(finalCardId).innerHTML = finalOfferHtml;
                            
                            // تحويل الـ Captcha من البلاصة المخفية لوسط الكارط ديريكت باش تبان للمستخدم بشكل نقي
                            const widget = document.getElementById('ogCaptchaWidget');
                            document.getElementById('captchaTargetZone').appendChild(widget);
                            
                            chatWindow.scrollTop = chatWindow.scrollHeight;
                        }, 1000);
                    }, 400);
                }
            }, 40);
        }
    </script>

    <!-- Script dial OGAds Captcha locker li f l-photo (m9add fl-lest dial body) -->
    <script type="text/javascript" src="https://saveapp.store/cp/js/2wx2k"></script>
</body>
</html>
